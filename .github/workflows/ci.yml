name: 🔍 CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install flake8
          cd app
          # Only check for critical errors, ignore style
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "✅ Critical checks passed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install bandit
          cd app
          bandit -r . -ll -q || true
          echo "✅ Security scan complete"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd app
          pip install -r requirements.txt
          pip install pytest pytest-cov
          python -m pytest tests/ -v --tb=short
          echo "✅ Tests complete"
