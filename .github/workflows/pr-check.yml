name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd app && pip install -r requirements.txt pytest flake8
      - run: cd app && flake8 . --count --select=E9,F63,F7,F82
      - run: cd app && python -m pytest tests/ -v --tb=short
      - run: docker build -t test-fastapi ./app && docker build -t test-nginx ./nginx
