name: Build Push Deploy

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd app
          pip install -r requirements.txt pytest
          python -m pytest tests/ -v

  build-push:
    name: Build and Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ab90909090hi/devops-fastapi:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ab90909090hi/devops-nginx:latest

  deploy:
    name: Deploy to EC2
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/devops-app/devops-assignment
            git pull origin main
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ab90909090hi --password-stdin
            docker compose down
            docker compose pull
            docker compose up -d
            sleep 15
            curl -f http://localhost/health && echo "OK" || echo "FAIL"
