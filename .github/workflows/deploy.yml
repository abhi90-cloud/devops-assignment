name: 🚀 Deploy to Production

on:
  workflow_run:
    workflows: ["📦 Build & Push Images"]
    types: [completed]
  workflow_dispatch:

env:
  APP_URL: https://ai-backend.astrodirectory.in

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Backup Database
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/devops-app
            ./scripts/backup.sh 2>/dev/null || true
      
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/devops-app/devops-assignment
            git pull origin main
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin 2>/dev/null
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 15
            curl -f http://localhost/health && echo "✅ OK" || exit 1
      
      - name: Smoke Tests
        run: |
          sleep 10
          curl -fs ${{ env.APP_URL }}/health && echo "✅ Health OK"
          curl -fs -X POST ${{ env.APP_URL }}/predict \
            -H "Content-Type: application/json" \
            -d '{"text":"I love this!"}' && echo "✅ API OK"
