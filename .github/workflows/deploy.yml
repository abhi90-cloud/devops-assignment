name: 🚀 Deploy

on:
  workflow_run:
    workflows: ["📦 Build & Push"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/devops-app/devops-assignment
            git pull origin main
            
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin 2>/dev/null
            
            docker compose pull
            docker compose up -d --remove-orphans
            
            sleep 15
            curl -f http://localhost/health && echo "✅ Deploy OK" || { echo "❌ Failed"; exit 1; }
      
      - name: Verify
        run: |
          sleep 10
          curl -fs https://ai-backend.astrodirectory.in/health && echo "✅ Production healthy"
          curl -fs -X POST https://ai-backend.astrodirectory.in/predict \
            -H "Content-Type: application/json" \
            -d '{"text":"I love this!"}' > /dev/null && echo "✅ API working"
