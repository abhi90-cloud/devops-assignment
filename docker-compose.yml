services:
  fastapi:
    image: ab90909090hi/devops-fastapi:latest
    container_name: fastapi_app
    restart: always
    pull_policy: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=devopsadmin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-DevOpsProd2024!}
      - POSTGRES_DB=devopsdb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-RedisProd2024!}
      - ENVIRONMENT=production
    volumes:
      - app_logs:/app/logs
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=devopsadmin
      - POSTGRES_PASSWORD=DevOpsProd2024!
      - POSTGRES_DB=devopsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devopsadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    command: redis-server --appendonly yes --requirepass RedisProd2024! --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisProd2024!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: ab90909090hi/devops-nginx:latest
    container_name: nginx_proxy
    restart: always
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app_network
    depends_on:
      fastapi:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  app_logs:
  nginx_logs:

networks:
  app_network:
    driver: bridge
